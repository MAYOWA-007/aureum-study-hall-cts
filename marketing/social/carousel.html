<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1080, initial-scale=1" />
  <link rel="icon" href="../../public/favicon-192.png" type="image/png" />
  <title>Aureum Study Hall — CTS Social Carousel</title>
  <style>
    :root {
      --emerald: #07392e;
      --emerald-2: #0d503f;
      --ink: #13231f;
      --cream: #f4efe3;
      --paper: #fbf8ef;
      --gold: #d7b75e;
      --gold-soft: #f0dda0;
      --muted: #65736e;
      --crimson: #a72234;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 1080px; height: 1350px; overflow: hidden; background: var(--emerald); }
    body { font-family: Arial, Helvetica, sans-serif; color: var(--ink); }
    .slide { width: 1080px; height: 1350px; position: relative; overflow: hidden; background: var(--cream); }
    .slide::after { content: ""; position: absolute; inset: 0; pointer-events: none; opacity: .38; background-image: repeating-linear-gradient(0deg, transparent 0 3px, rgba(51, 44, 29, .025) 4px); }
    .topbar { position: relative; z-index: 5; height: 118px; display: flex; align-items: center; justify-content: space-between; padding: 26px 62px; border-bottom: 1px solid rgba(215, 183, 94, .44); }
    .brand { display: flex; align-items: center; gap: 18px; color: var(--emerald); font-size: 16px; font-weight: 800; letter-spacing: .18em; }
    .brand img { width: 62px; height: 62px; border-radius: 16px; object-fit: cover; box-shadow: 0 8px 24px rgba(7, 57, 46, .18); }
    .project-pill { padding: 10px 16px; color: var(--emerald); border: 1px solid rgba(7, 57, 46, .32); font-size: 13px; font-weight: 800; letter-spacing: .16em; }
    .content { position: relative; z-index: 3; padding: 72px 66px 110px; }
    .eyebrow { margin: 0 0 18px; color: #916d19; font-size: 14px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; }
    h1, h2, p { margin-top: 0; }
    h1, h2 { font-family: Georgia, "Times New Roman", serif; font-weight: 500; }
    h1 { margin-bottom: 24px; color: var(--emerald); font-size: 68px; line-height: .98; letter-spacing: -.045em; max-width: 880px; }
    .lede { margin-bottom: 42px; max-width: 840px; color: #52615c; font-size: 24px; line-height: 1.5; }
    .slide-index { position: absolute; z-index: 5; right: 60px; bottom: 44px; color: #8a7a52; font-size: 14px; font-weight: 800; letter-spacing: .18em; }
    .footer-note { position: absolute; z-index: 5; left: 64px; bottom: 42px; max-width: 760px; color: #6b756f; font-size: 13px; line-height: 1.45; }

    .cover { color: var(--paper); background: var(--emerald); }
    .cover::before { content: ""; position: absolute; inset: 0; background-image: linear-gradient(180deg, rgba(3, 28, 23, .2), rgba(3, 28, 23, .76)), url("./assets/aureum-signal-background.png"); background-size: cover; background-position: center; }
    .cover .topbar { color: white; border-color: rgba(240, 221, 160, .26); }
    .cover .brand, .cover .project-pill { color: var(--gold-soft); }
    .cover .project-pill { border-color: rgba(240, 221, 160, .42); background: rgba(0, 0, 0, .16); }
    .cover-content { position: relative; z-index: 3; padding: 68px 66px 60px; }
    .cover-logo { width: 224px; height: 224px; display: block; margin-bottom: 38px; border: 1px solid rgba(240, 221, 160, .55); border-radius: 34px; object-fit: cover; box-shadow: 0 24px 60px rgba(0, 0, 0, .34); }
    .cover .eyebrow { color: var(--gold-soft); }
    .cover h1 { max-width: 860px; margin-bottom: 26px; color: white; font-size: 84px; line-height: .94; }
    .cover .lede { max-width: 800px; color: rgba(255, 255, 255, .77); font-size: 27px; }
    .cover-proof { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 44px; }
    .cover-proof div { min-height: 132px; padding: 23px; border: 1px solid rgba(240, 221, 160, .26); background: rgba(0, 0, 0, .22); backdrop-filter: blur(8px); }
    .cover-proof strong { display: block; margin-bottom: 8px; color: var(--gold-soft); font: 500 39px Georgia, serif; }
    .cover-proof span { color: rgba(255, 255, 255, .72); font-size: 15px; line-height: 1.35; }
    .cover .footer-note, .cover .slide-index { color: rgba(255, 255, 255, .58); }

    .option-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .option { min-height: 214px; padding: 30px; border: 1px solid rgba(7, 57, 46, .21); background: rgba(255, 255, 255, .6); position: relative; overflow: hidden; }
    .option::after { content: ""; position: absolute; width: 120px; height: 120px; right: -40px; bottom: -55px; border-radius: 50%; border: 1px solid rgba(215, 183, 94, .38); box-shadow: 0 0 0 18px rgba(215, 183, 94, .06); }
    .option strong { display: block; margin-bottom: 6px; color: var(--emerald); font: 500 60px Georgia, serif; }
    .option b { display: block; margin-bottom: 12px; color: var(--ink); font-size: 20px; }
    .option span { color: var(--muted); font-size: 16px; line-height: 1.45; }
    .wide-note { display: flex; align-items: center; gap: 20px; margin-top: 18px; padding: 24px 28px; color: white; background: var(--emerald); }
    .wide-note b { color: var(--gold-soft); font: italic 32px Georgia, serif; white-space: nowrap; }
    .wide-note span { font-size: 17px; line-height: 1.45; }

    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .mode-card { min-height: 196px; padding: 29px; border: 1px solid rgba(7, 57, 46, .18); background: var(--paper); }
    .mode-card .mark { display: grid; place-items: center; width: 52px; height: 52px; margin-bottom: 21px; border: 1px solid var(--gold); color: var(--emerald); font: italic 22px Georgia, serif; }
    .mode-card h2 { margin-bottom: 11px; color: var(--emerald); font-size: 29px; }
    .mode-card p { margin: 0; color: var(--muted); font-size: 16px; line-height: 1.5; }
    .keyboard-line { margin-top: 18px; padding: 22px 28px; border-left: 5px solid var(--gold); color: #44534e; background: rgba(215, 183, 94, .14); font-size: 17px; line-height: 1.5; }

    .interaction-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .interaction { min-height: 233px; padding: 25px 24px; border: 1px solid rgba(7, 57, 46, .18); background: rgba(255, 255, 255, .64); }
    .interaction strong { display: block; color: var(--emerald); font: 500 48px Georgia, serif; }
    .interaction i { display: block; width: 44px; height: 3px; margin: 15px 0 19px; background: var(--gold); }
    .interaction b { display: block; margin-bottom: 10px; font-size: 18px; }
    .interaction span { color: var(--muted); font-size: 14px; line-height: 1.45; }
    .integrity-strip { margin-top: 18px; padding: 22px 25px; color: white; background: linear-gradient(110deg, var(--emerald), var(--emerald-2)); font-size: 16px; line-height: 1.5; }

    .teaching-layout { display: grid; grid-template-columns: 1.1fr .9fr; gap: 20px; }
    .rationale-panel { min-height: 668px; padding: 38px; color: white; background: var(--emerald); position: relative; overflow: hidden; }
    .rationale-panel::after { content: "A"; position: absolute; right: -24px; bottom: -78px; color: rgba(255,255,255,.035); font: 700 330px Georgia, serif; }
    .rationale-panel strong { display: block; color: var(--gold-soft); font: 500 74px Georgia, serif; }
    .rationale-panel h2 { margin: 16px 0 20px; color: white; font-size: 38px; line-height: 1.1; }
    .rationale-panel p { color: rgba(255,255,255,.72); font-size: 19px; line-height: 1.55; }
    .feedback-stack { display: grid; gap: 13px; }
    .feedback-card { min-height: 150px; padding: 24px; border: 1px solid rgba(7, 57, 46, .18); background: var(--paper); }
    .feedback-card b { display: block; margin-bottom: 9px; color: var(--emerald); font-size: 18px; }
    .feedback-card p { margin: 0; color: var(--muted); font-size: 15px; line-height: 1.45; }

    .privacy-slide { color: white; background: var(--emerald); }
    .privacy-slide::before { content: ""; position: absolute; inset: 0; opacity: .23; background-image: linear-gradient(100deg, rgba(3, 28, 23, .7), rgba(3, 28, 23, .3)), url("./assets/aureum-signal-background.png"); background-size: cover; background-position: center; }
    .privacy-slide .topbar { color: white; border-color: rgba(240, 221, 160, .26); }
    .privacy-slide .brand, .privacy-slide .project-pill { color: var(--gold-soft); }
    .privacy-slide .project-pill { border-color: rgba(240, 221, 160, .4); }
    .privacy-slide h1 { color: white; max-width: 820px; }
    .privacy-slide .lede { color: rgba(255,255,255,.74); }
    .privacy-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .privacy-card { min-height: 126px; padding: 25px 28px; border: 1px solid rgba(240, 221, 160, .28); background: rgba(0,0,0,.2); backdrop-filter: blur(7px); }
    .privacy-card b { display: block; margin-bottom: 8px; color: var(--gold-soft); font: 500 27px Georgia, serif; }
    .privacy-card span { color: rgba(255,255,255,.72); font-size: 15px; line-height: 1.4; }
    .cta { margin-top: 34px; padding: 32px 34px; color: var(--ink); background: var(--gold-soft); box-shadow: 0 18px 45px rgba(0,0,0,.18); }
    .cta small { display: block; margin-bottom: 10px; color: #715715; font-size: 12px; font-weight: 800; letter-spacing: .2em; text-transform: uppercase; }
    .cta strong { display: block; font: 500 31px Georgia, serif; overflow-wrap: anywhere; }
    .privacy-slide .footer-note, .privacy-slide .slide-index { color: rgba(255,255,255,.58); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const logo = "./assets/aureum-a-master.png";
    const topbar = () => `<header class="topbar"><div class="brand"><img src="${logo}" alt="" />AUREUM STUDY HALL</div><div class="project-pill">CTS PRACTICE</div></header>`;
    const foot = (n, note = "Independent practice resource. Not affiliated with or endorsed by AVIXA.") => `<div class="footer-note">${note}</div><div class="slide-index">${String(n).padStart(2, "0")} / 06</div>`;
    const slides = [
      `<section class="slide cover">${topbar()}<main class="cover-content"><img class="cover-logo" src="${logo}" alt="Aureum A emblem" /><p class="eyebrow">The first release in the Aureum Study Hall series</p><h1>Build the judgment behind the signal.</h1><p class="lede">Free CTS® practice with 300 original, source-grounded questions—and no account required.</p><div class="cover-proof"><div><strong>300</strong><span>questions across the complete mastery bank</span></div><div><strong>115</strong><span>question simulation paced for 150 minutes</span></div><div><strong>4</strong><span>CTS duty areas in blueprint-balanced sessions</span></div></div></main>${foot(1)}`,
      `<section class="slide">${topbar()}<main class="content"><p class="eyebrow">Flexible practice</p><h1>Choose the session that fits the day.</h1><p class="lede">Start with a focused drill, simulate the official pace, or work through the full bank.</p><div class="option-grid"><article class="option"><strong>20</strong><b>Quick drill</b><span>Fast, focused practice when time is limited.</span></article><article class="option"><strong>60</strong><b>Deep practice</b><span>Enough range to expose patterns and weak spots.</span></article><article class="option"><strong>115</strong><b>Exam simulation</b><span>A complete session paced for 150 minutes.</span></article><article class="option"><strong>300</strong><b>Full mastery</b><span>Work every original question in the bank.</span></article></div><div class="wide-note"><b>A–D</b><span>Use a blueprint-balanced mix or focus on one duty: Creating, Implementing, Supporting, or Servicing AV Solutions.</span></div></main>${foot(2)}`,
      `<section class="slide">${topbar()}<main class="content"><p class="eyebrow">A better practice loop</p><h1>Practice the way technical judgment develops.</h1><p class="lede">Move between realistic pressure and deliberate learning without losing your place.</p><div class="mode-grid"><article class="mode-card"><div class="mark">01</div><h2>Timed mode</h2><p>Use an official-style pace with automatic time tracking.</p></article><article class="mode-card"><div class="mark">02</div><h2>Study mode</h2><p>Check answers and learn from explanations while you work.</p></article><article class="mode-card"><div class="mark">03</div><h2>Shuffle + flags</h2><p>Create a fresh order and mark uncertain items for review.</p></article><article class="mode-card"><div class="mark">04</div><h2>Save + resume</h2><p>Your exact session, responses, order, and position stay local.</p></article></div><div class="keyboard-line"><b>Hints that fit the device:</b> press and hold on mobile, tap Hint Lens for an accessible alternative, or hold Control on desktop.</div></main>${foot(3)}`,
      `<section class="slide">${topbar()}<main class="content"><p class="eyebrow">Beyond basic multiple choice</p><h1>Six ways to test understanding.</h1><p class="lede">Custom learning interactions exercise recognition, sequencing, calculations, signal flow, and decision-making.</p><div class="interaction-grid"><article class="interaction"><strong>229</strong><i></i><b>Choice</b><span>Single-best-answer scenarios and concepts.</span></article><article class="interaction"><strong>27</strong><i></i><b>Hotspots</b><span>Select the correct labeled diagram region.</span></article><article class="interaction"><strong>27</strong><i></i><b>Connections</b><span>Connect a prompt node to the best destination.</span></article><article class="interaction"><strong>10</strong><i></i><b>Sequences</b><span>Put workflows and procedures in order.</span></article><article class="interaction"><strong>5</strong><i></i><b>Numeric</b><span>Calculate and enter values with tolerance.</span></article><article class="interaction"><strong>2</strong><i></i><b>Multi-select</b><span>Recognize every response that applies.</span></article></div><div class="integrity-strip">These are original learning interactions—not live, leaked, or copied exam questions.</div></main>${foot(4)}`,
      `<section class="slide">${topbar()}<main class="content"><p class="eyebrow">Feedback that teaches</p><h1>Every answer becomes a study opportunity.</h1><p class="lede">The report shows more than a score—it points to the workflow and reasoning that need another pass.</p><div class="teaching-layout"><article class="rationale-panel"><strong>1,142</strong><h2>choice-by-choice rationales</h2><p>Understand why the best response fits and why each distractor fails.</p><p>Source citations and study notes keep review grounded and actionable.</p></article><div class="feedback-stack"><article class="feedback-card"><b>Duty breakdown</b><p>See performance across the four CTS duty areas.</p></article><article class="feedback-card"><b>Task diagnostics</b><p>Find the exact workflow areas that deserve more attention.</p></article><article class="feedback-card"><b>Detailed review</b><p>Compare your response, the best answer, teaching note, and source.</p></article><article class="feedback-card"><b>Practice missed items</b><p>Turn unanswered, incorrect, and flagged questions into the next session.</p></article></div></div></main>${foot(5)}`,
      `<section class="slide privacy-slide">${topbar()}<main class="content"><p class="eyebrow">Free and private by design</p><h1>No account. No backend. No payment wall.</h1><p class="lede">Your study record stays in your browser, while useful exports remain under your control.</p><div class="privacy-grid"><article class="privacy-card"><b>Local progress</b><span>Resume data and attempt history stay on this device.</span></article><article class="privacy-card"><b>No analytics</b><span>No behavioral tracking or advertising profile.</span></article><article class="privacy-card"><b>Offline-ready</b><span>Continue after the first successful visit and cache.</span></article><article class="privacy-card"><b>Useful exports</b><span>Download CSV reports or print/save a PDF review.</span></article></div><div class="cta"><small>Open the free CTS project</small><strong>mayowa-007.github.io/aureum-study-hall-cts/</strong></div></main>${foot(6, "CTS® and AVIXA® are marks of AVIXA, Inc. Independent study material; no pass guarantee.")}`,
    ];
    const requested = Number(new URLSearchParams(location.search).get("slide") || 1);
    document.getElementById("root").innerHTML = slides[Math.min(Math.max(requested, 1), slides.length) - 1];
  </script>
</body>
</html>
